settings:
  disableAntiLock: false
  maxJobPage: 5
  maxPeoplePerProfile: 3
  recruitersOnly: true
  sendInviteNote: true
  resumeDriveLink: https://drive.google.com/file/d/1VQh9qPqK4yIw4ebxQ4KjKaKpZo_ajujz/view?usp=sharing
  resumeDriveLinkFrontend: https://drive.google.com/file/d/1VQh9qPqK4yIw4ebxQ4KjKaKpZo_ajujz/view?usp=sharing
  inviteNoteTemplate: 'Hi {name}, I''m Mohnish — Full Stack Dev (4+ yrs, React/Node/Python).
    Saw the {job_title} role; strong fit, would love a referral. Resume: {resume_link}'
  inviteNoteTemplateFrontend: 'Hi {name}, I''m Mohnish — Frontend Dev (4+ yrs, React/Next.js/UI/UX).
    Saw the {job_title} role; strong fit, would love a referral. Resume: {resume_link}'
  contactHirerFirst: true
  inviteNoteTemplateHirer: 'Hi {name}, I''m {candidate_first_name} — {candidate_bio}.
    Saw you posted the {job_title} role at {company}; strong fit. Resume: {resume_link}'
  inviteNoteTemplateHirerFrontend: 'Hi {name}, I''m {candidate_first_name} — {candidate_bio}.
    Saw you posted the {job_title} role at {company}; strong fit. Resume: {resume_link}'
  aiSystemPromptTemplate: 'You are an AI evaluating {candidate_name}''s fit for a
    software engineering role.


    Candidate profile:

    {candidate_profile_block}


    ### Decision Criteria

    Recommend **YES** if:

    - The role is a software engineering / web / frontend / backend / full-stack /
    SaaS / cloud / automation role.

    - Candidate meets at least 60% of the core technical requirements (or has equivalent
    transferable tech).

    - Experience gap is 3 years or less (i.e. role asks for <= 7 yrs).

    - Role is NOT a pure data-science / ML-research / mobile-only (iOS/Android native)
    / embedded / DevOps-SRE-only / QA-only role unless the candidate has matching
    exposure.


    Recommend **NO** if:

    - Role demands deep niche tech not in the profile (Rust, Go primary, Solidity,
    Salesforce, SAP, .NET, Java backend primary, Android/iOS native, etc.) and lists
    them as required.

    - Senior+ role demanding 8+ yrs experience.

    - Pure non-engineering role (PM, BA, sales, support, marketing).


    ### Response Format (strict)

    First line: `Match Status: YES` or `Match Status: NO`.


    If YES, next list 7 short (2–4 word) keywords that either don''t appear in the
    resume verbatim or should be reworded to mirror the JD''s terminology. At least
    3 must be technical (frameworks, tools, services). Use bullet lines starting with
    `- `.


    Then output `Referral Message:` on its own line followed by a longer (multi-line)
    friendly referral request — used as a follow-up DM after connection accepts. Format:


    Hi {{Name}},

    Thanks for connecting!


    I''m interested in the **{{job_title}}** role at **{{company}}** and noticed you''re
    a recruiter / hiring there.

    I''d really appreciate it if you could refer me for this role.


    Job link: {{job_link or job id}}


    Quick context — {candidate_pitch}


    Resume: {resume_link}


    Thanks so much for your support!

    {candidate_name}

    {candidate_email}


    If NO, return ONLY the line `Match Status: NO` and nothing else.

    '
  emailSubjectTemplate: 'Referral request: {job_title} at {company}'
  emailBodyTemplate: 'Hi {name},


    I came across the {job_title} opening at {company} and felt my background is a
    strong match.


    Quick context — I''m {candidate_first_name}, a {candidate_bio_long}. Resume: {resume_link}


    If the role is still open, I''d be grateful for a referral or any pointer toward
    the hiring manager.


    Thanks!

    {candidate_name}

    {candidate_email}

    '
