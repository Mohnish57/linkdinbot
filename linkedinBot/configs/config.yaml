settings:
  disableAntiLock: false
  maxJobPage: 5
  maxPeoplePerProfile: 3
  recruitersOnly: true
  sendInviteNote: true
  contactHirerFirst: true
  resumeDriveLink: https://tinyurl.com/23lvedje
  resumeDriveLinkFrontend: https://tinyurl.com/23lvedje
  inviteNoteTemplate: 'Hi {name}, I came across the {job_title} opening at your company
    and believe my experience aligns well with the role.

    I''d love to connect. Resume: {drive_link}

    '
  inviteNoteTemplateFrontend: 'Hi {name}, I came across the {job_title} opening at
    your company and believe my experience aligns well with the role.

    I''d love to connect. Resume: {drive_link}

    '
  inviteNoteTemplateHirer: 'Hi {name}, I came across the {job_title} opening at your
    company and believe my experience aligns well with the role.

    I''d love to connect. Resume: {drive_link}

    '
  inviteNoteTemplateHirerFrontend: 'Hi {name}, I came across the {job_title} opening
    at your company and believe my experience aligns well with the role.

    I''d love to connect. Resume: {drive_link}

    '
  aiSystemPromptTemplate: 'You are an AI evaluating {candidate_name}''''s fit for
    a software engineering role.


    Candidate profile:

    {candidate_profile_block}


    ### Decision Criteria

    Recommend YES if:

    - The role is a software engineering / web / frontend / backend / full-stack /
    SaaS / cloud / automation role.

    - Candidate meets at least 60% of the core technical requirements.

    - Experience gap is 3 years or less.

    - Role is not a pure data-science / ML-research / mobile-only / embedded / QA-only
    role unless the candidate has matching exposure.


    Recommend NO if:

    - Role demands deep niche tech not in the profile (Rust, Go, Solidity, Salesforce,
    SAP, .NET, Java backend primary, Android/iOS native, etc.).

    - Senior+ role demanding 8+ yrs experience.

    - Pure non-engineering role (PM, BA, sales, support, marketing).


    ### Response Format (strict)

    First line: Match Status: YES or Match Status: NO.


    If YES, list short keywords that don''''t appear in the resume and then output
    Referral Message:

    Hi {{Name}},

    Thanks for connecting!

    I''''m interested in the **{{job_title}}** role at **{{company}}** and noticed
    you''''re a recruiter / hiring there.

    Job link: {{job_link or job id}}

    Quick context — {candidate_pitch}

    Resume: {resume_link}

    Thanks so much for your support!

    {candidate_name}

    {candidate_email}

    '
  emailSubjectTemplate: 'Referral request: {job_title} at {company}'
  emailBodyTemplate: 'Hi {name},


    I came across the {job_title} opening at {company} and felt my background is a
    strong match.


    Quick context — I''''m {candidate_first_name}, a {candidate_bio_long}. Resume:
    {resume_link}


    If the role is still open, I''''d be grateful for a referral or any pointer toward
    the hiring manager.


    Thanks!

    {candidate_name}

    {candidate_email}

    '
  postSearch:
    keywords:
    - frontend developer
    - full stack developer
    - lead frontend developer
    maxPostsPerKeyword: 20
    recent24Hours: true
